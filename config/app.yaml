app:
  name: "OmniverseCORE"
  version: "1.0.0"
  environment: "development"

branding:
  owner: "The MadDoG.tmdg"
  tagline: "Universal Tech Framework"
  theme: "cyberpunk"

features:
  system_optimization: true
  ai_engine: true
  dashboard: true
  api_rest: true
  api_graphql: true
  api_grpc: true
  devops_stack: true
  modules_marketplace: true

api:
  rest:
    host: "0.0.0.0"
    port: 8000
  graphql:
    host: "0.0.0.0"
    port: 8001
  grpc:
    host: "0.0.0.0"
    port: 8002

dashboard:
  host: "0.0.0.0"
  port: 3000
  mode: "development"

logging:
  level: "INFO"
  format: "json"
  color: true

security:
  enable_auth: true
  enable_rate_limit: true
  cors_allowed_origins:
    - "http://localhost:3000"
    - "http://127.0.0.1:3000"
