[app]
name = OmniverseCORE
version = 1.0.0
environment = production

[logging]
level = INFO
format = text
color = true

[system]
optimize_linux = true
optimize_windows = true
optimize_macos = true
optimize_android = true

[network]
enable_tuning = true
default_profile = balanced

[security]
enable_firewall_rules = true
enable_hardening = true
