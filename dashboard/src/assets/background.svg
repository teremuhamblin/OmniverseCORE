<svg width="100%" height="100%" viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0A0F1F"/>
      <stop offset="100%" stop-color="#00111A"/>
    </linearGradient>

    <!-- Grid lines -->
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M 80 0 L 0 0 0 80" fill="none" stroke="#00D4FF" stroke-width="0.5" opacity="0.15"/>
    </pattern>

    <!-- Matrix drops -->
    <linearGradient id="matrix" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- Grid -->
  <rect width="100%" height="100%" fill="url(#grid)"/>

  <!-- Matrix vertical lines -->
  <g opacity="0.25">
    <rect x="200" width="2" height="1080" fill="url(#matrix)"/>
    <rect x="600" width="2" height="1080" fill="url(#matrix)"/>
    <rect x="1000" width="2" height="1080" fill="url(#matrix)"/>
    <rect x="1400" width="2" height="1080" fill="url(#matrix)"/>
  </g>

  <!-- Blueprint circles -->
  <circle cx="400" cy="300" r="120" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.15"/>
  <circle cx="1500" cy="700" r="180" fill="none" stroke="#00D4FF" stroke-width="1" opacity="0.15"/>
</svg>
