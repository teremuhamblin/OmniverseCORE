<svg width="220" height="220" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="scan" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#00D4FF" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00D4FF" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- Glow -->
  <circle cx="110" cy="110" r="90" fill="url(#glow)"/>

  <!-- Hexagon -->
  <polygon points="110,20 185,65 185,155 110,200 35,155 35,65"
           fill="none" stroke="#00D4FF" stroke-width="4"/>

  <!-- Inner O -->
  <circle cx="110" cy="110" r="45"
          fill="none" stroke="#00D4FF" stroke-width="6"/>

  <!-- Scanlines -->
  <rect x="0" y="0" width="220" height="220" fill="url(#scan)"/>
</svg>
